name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Frontend tests — all platforms
  # ─────────────────────────────────────────────
  test-frontend:
    name: Frontend tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack (yarn)
        run: corepack enable

      - name: Install dependencies
        run: yarn --cwd apps/forgecut_gui/ui install --frozen-lockfile

      - name: Run tests
        run: yarn --cwd apps/forgecut_gui/ui test

      - name: Build frontend
        run: yarn --cwd apps/forgecut_gui/ui build

  # ─────────────────────────────────────────────
  # Electron build — Linux only
  # ─────────────────────────────────────────────
  build-electron-linux:
    name: Electron build (Linux)
    runs-on: ubuntu-latest
    needs: [test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack (yarn)
        run: corepack enable

      - name: Install frontend dependencies
        run: yarn --cwd apps/forgecut_gui/ui install --frozen-lockfile

      - name: Build renderer and Electron main
        run: yarn --cwd apps/forgecut_gui/ui build

      - name: Verify Electron startup
        run: xvfb-run --auto-servernum yarn --cwd apps/forgecut_gui/ui verify:electron
        env:
          ELECTRON_DISABLE_SANDBOX: "1"
